<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin - Tickets</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="max-w-7xl mx-auto p-4">

<div class="flex flex-col md:flex-row md:items-center md:justify-between mb-6">

<h1 class="text-2xl md:text-3xl font-bold">
Gestão de Tickets
</h1>

<input
id="search"
placeholder="Pesquisar ticket, nome ou telefone"
class="border rounded-lg px-3 py-2 mt-3 md:mt-0 w-full md:w-80">

</div>

<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">

<div class="bg-white p-4 rounded-xl shadow">
<div class="text-gray-500 text-sm">Total</div>
<div id="total" class="text-2xl font-bold"></div>
</div>

<div class="bg-blue-50 p-4 rounded-xl shadow">
<div class="text-blue-700 text-sm">Abertos</div>
<div id="open" class="text-2xl font-bold text-blue-700"></div>
</div>

<div class="bg-yellow-50 p-4 rounded-xl shadow">
<div class="text-yellow-700 text-sm">Pendentes</div>
<div id="pending" class="text-2xl font-bold text-yellow-700"></div>
</div>

<div class="bg-green-50 p-4 rounded-xl shadow">
<div class="text-green-700 text-sm">Resolvidos</div>
<div id="closed" class="text-2xl font-bold text-green-700"></div>
</div>

</div>

<div class="flex flex-wrap gap-2 mb-6">

<button onclick="showAbertos()"
class="px-3 py-1 rounded-lg bg-blue-500 text-white">
Abertos
</button>

<button onclick="showPendentes()"
class="px-3 py-1 rounded-lg bg-yellow-400 text-white">
Pendentes
</button>

<button onclick="showResolvidos()"
class="px-3 py-1 rounded-lg bg-green-500 text-white">
Resolvidos
</button>

<button onclick="showTodos()"
class="px-3 py-1 rounded-lg bg-gray-600 text-white">
Todos
</button>

</div>

<div id="tickets"></div>

</div>

<script>

let tickets = []

async function loadTickets(){

 try{

  const res = await fetch("/api/tickets")

  if(!res.ok){
   throw new Error("Erro API")
  }

  tickets = await res.json()

  tickets.sort((a,b)=>
   new Date(b["Última Atualização"] || b.Data) -
   new Date(a["Última Atualização"] || a.Data)
  )

  if(!Array.isArray(tickets)){
   console.log("Resposta inesperada:",tickets)
   tickets = []
  }

  renderTickets(
   tickets.filter(t => t.Estado === "Aberto")
  )

  dashboard()

 }catch(err){

  console.error("Erro ao carregar tickets:",err)

 }

}

function dashboard(){

 const total = tickets.length

 const abertos =
 tickets.filter(t => t.Estado === "Aberto")

 const pendentes =
 tickets.filter(t =>
  t.Estado === "Respondido" ||
  t.Estado === "Pendente"
 )

 const resolvidos =
 tickets.filter(t =>
  t.Estado === "Resolvido"
 )

 document.getElementById("total").innerText = total
 document.getElementById("open").innerText = abertos.length
 document.getElementById("pending").innerText = pendentes.length
 document.getElementById("closed").innerText = resolvidos.length

}

function statusColor(estado){

 if(estado === "Aberto") return "border-l-4 border-blue-500"
 if(estado === "Respondido") return "border-l-4 border-orange-400"
 if(estado === "Pendente") return "border-l-4 border-yellow-400"
 if(estado === "Resolvido") return "border-l-4 border-green-500"

 return ""

}

function renderTickets(data){

 const container = document.getElementById("tickets")

 container.innerHTML = data.map(t => {

 let photos = ""

 const fotos = t.Fotos || t.Foto || ""

 if(fotos){

  const list = fotos.split("\n")

  photos = list.map(img => `
 
  <img
  src="${img.replace('/upload/','/upload/w_300/')}"
  onclick="openLightbox('${img}')"
  onerror="this.style.display='none'"
  class="w-24 md:w-32 rounded-lg shadow cursor-pointer hover:scale-105 transition">

  `).join("")

 }

 return `

 <div class="bg-white p-4 rounded-xl shadow mb-4 ${statusColor(t.Estado)}">

 <div class="flex flex-col md:flex-row md:justify-between md:items-center">

 <div>

 <div class="font-bold text-lg">
 ${t.Ticket}
 </div>

 <div class="text-gray-600 text-sm">
 ${t.Nome} • ${t.Telefone}
 </div>

 <div class="text-gray-500 text-sm">
 ${t.Localidade}
 </div>

 <p class="text-gray-700 text-sm mt-2">
 ${t.Descricao || t.Descrição || ""}
 </p>

 <div class="mt-3 grid grid-cols-3 md:grid-cols-5 gap-2">
 ${photos}
 </div>

 </div>

 <div class="mt-2 md:mt-0">

 <select id="estado-${t.Ticket}"
 class="border rounded px-2 py-1">

 <option ${t.Estado==="Aberto"?"selected":""}>Aberto</option>
 <option ${t.Estado==="Respondido"?"selected":""}>Respondido</option>
 <option ${t.Estado==="Pendente"?"selected":""}>Pendente</option>
 <option ${t.Estado==="Resolvido"?"selected":""}>Resolvido</option>

 </select>
 
 </div>

 </div>

 <div class="bg-gray-50 p-3 rounded-lg text-sm mt-4">

 <div class="font-semibold mb-1">
 Histórico
 </div>

 <div class="text-gray-600">

 ${t["Observações"] ? t["Observações"].replace(/\n/g,"<br>") : "Sem histórico"}

 </div>

 </div>

 <textarea
 id="obs-${t.Ticket}"
 class="border p-2 w-full mt-2"
 placeholder="Adicionar observação"></textarea>

 <button
  class="bg-blue-500 text-white px-2 py-1 mt-2 rounded"
  onclick="saveTicket('${t.Ticket}')">

 Guardar

 </button>

 <div class="text-xs text-gray-500 mt-2">

 Última atualização:
 ${t["Última Atualização"] || "-"}

 </div>

 </div>

 </div>

 `

 }).join("")

}

document.getElementById("search").addEventListener("input", e => {

 const q = e.target.value.toLowerCase().trim()

 const filtered = tickets.filter(t => {

  const nome = (t.Nome || "").toLowerCase()
  const telefone = (t.Telefone || "").toString()
  const ticket = (t.Ticket || "").toLowerCase()

  return (
   nome.includes(q) ||
   telefone.includes(q) ||
   ticket.includes(q)
  )

 })

 renderTickets(filtered)

})

loadTickets()

function showAbertos(){

 renderTickets(
  tickets.filter(t => t.Estado === "Aberto")
 )

}

function showPendentes(){

 renderTickets(
  tickets.filter(t =>
   t.Estado === "Respondido" ||
   t.Estado === "Pendente"
  )
 )

}

function showResolvidos(){

 renderTickets(
  tickets.filter(t => t.Estado === "Resolvido")
 )

}

function showTodos(){

 renderTickets(tickets)

}


async function saveTicket(ticket){

 const estado =
 document.getElementById(`estado-${ticket}`).value

 const obs =
 document.getElementById(`obs-${ticket}`).value

 await fetch("/api/updateTicket",{
  method:"POST",
  headers:{
   "Content-Type":"application/json"
  },
  body:JSON.stringify({
   ticket,
   estado,
   obs
  })
 })

 const btn = document.querySelector(`#obs-${ticket}`).nextElementSibling
 btn.innerText = "✔ Guardado"

 setTimeout(()=>{
  btn.innerText = "Guardar"
 },1500)

 loadTickets()

 }

function openLightbox(src){

 const box = document.getElementById("lightbox")
 const img = document.getElementById("lightbox-img")

 img.src = src
 box.classList.remove("hidden")

}

function closeLightbox(){
 document.getElementById("lightbox").classList.add("hidden")
}

document.addEventListener("click", function(e){

 const box = document.getElementById("lightbox")

 if(!box) return

 if(e.target.id === "lightbox"){
  closeLightbox()
 }

})

document.addEventListener("keydown", function(e){

 if(e.key === "Escape"){
  closeLightbox()
 }

})

document.addEventListener("DOMContentLoaded", () => {

 const lightbox = document.getElementById("lightbox")

 lightbox.onclick = function(e){

  if(e.target === lightbox){
   lightbox.classList.add("hidden")
  }

 }

 document.addEventListener("keydown", function(e){

  if(e.key === "Escape"){
   lightbox.classList.add("hidden")
  }

 })

})

</script>

<div id="lightbox"
class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-50">

<img id="lightbox-img"
class="max-w-[90%] max-h-[90%] rounded shadow-lg">

</div>

</body>
</html>
