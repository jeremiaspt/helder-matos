<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin - Tickets</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="max-w-6xl mx-auto p-4">

<h1 class="text-3xl font-bold mb-4">
Gestão de Tickets
</h1>

<div class="grid grid-cols-4 gap-4 mb-6">

<div class="bg-white p-4 rounded shadow">
<b>Total</b>
<div id="total"></div>
</div>

<div class="bg-white p-4 rounded shadow">
<b>Abertos</b>
<div id="open"></div>
</div>

<div class="bg-white p-4 rounded shadow">
<b>Pendentes</b>
<div id="pending"></div>
</div>

<div class="bg-white p-4 rounded shadow">
<b>Resolvidos</b>
<div id="closed"></div>
</div>

</div>

<div class="flex gap-3 mb-4">

<button onclick="showAbertos()" class="bg-blue-500 text-white px-3 py-1 rounded">
Abertos
</button>

<button onclick="showPendentes()" class="bg-yellow-500 text-white px-3 py-1 rounded">
Pendentes
</button>

<button onclick="showResolvidos()" class="bg-green-600 text-white px-3 py-1 rounded">
Resolvidos
</button>

<button onclick="showTodos()" class="bg-gray-600 text-white px-3 py-1 rounded">
Todos
</button>

</div>

<input
id="search"
placeholder="Pesquisar por nome ou telefone"
class="w-full border p-2 mb-4">

<div id="tickets"></div>

</div>

<script>

let tickets = []

async function loadTickets(){

 const res = await fetch("/api/tickets")

 tickets = await res.json()

 renderTickets(
  tickets.filter(t => t.Estado === "Aberto")
 )

 dashboard()

}

function dashboard(){

 const total = tickets.length

 const abertos =
 tickets.filter(t => t.Estado === "Aberto")

 const pendentes =
 tickets.filter(t =>
  t.Estado === "Respondido" ||
  t.Estado === "Pendente"
 )

 const resolvidos =
 tickets.filter(t =>
  t.Estado === "Resolvido"
 )

 document.getElementById("total").innerText = total
 document.getElementById("open").innerText = abertos.length
 document.getElementById("pending").innerText = pendentes.length
 document.getElementById("closed").innerText = resolvidos.length

}

function renderTickets(data){

 const container = document.getElementById("tickets")

 container.innerHTML = data.map(t => {

 let photos = ""

 if(t.Fotos){

 const list = t.Fotos.split("\n")

 photos = list.map(img => `
 
 <a href="${img}" target="_blank">
 <img
 src="${img.replace('/upload/','/upload/w_200/')}"
 class="w-32 inline-block mr-2 mb-2 rounded">
 </a>

 `).join("")

 }

 return `

 <div class="bg-white p-4 mb-4 rounded shadow">

 <b>${t.Ticket}</b> - ${t.Nome}

 <div class="text-sm text-gray-600">
 ${t.Telefone} | ${t.Localidade}
 </div>

 <p class="mt-2">${t.Descrição}</p>

 <div class="mt-2">${photos}</div>

 <div class="mt-2">

 <select
  class="border p-1"
  onchange="updateStatus('${t.Ticket}', this.value)">

 <option ${t.Estado==="Aberto"?"selected":""}>Aberto</option>
 <option ${t.Estado==="Respondido"?"selected":""}>Respondido</option>
 <option ${t.Estado==="Pendente"?"selected":""}>Pendente</option>
 <option ${t.Estado==="Resolvido"?"selected":""}>Resolvido</option>

 </select>

 <textarea
  id="obs-${t.Ticket}"
  class="border p-2 w-full mt-2"
  placeholder="Observação"></textarea>

 <button
  class="bg-blue-500 text-white px-2 py-1 mt-2 rounded"
  onclick="saveTicket('${t.Ticket}')">

 Guardar

 </button>

 <div class="text-xs text-gray-500 mt-2">

 Última atualização:
 ${t["Última Atualização"] || "-"}

 </div>

 </div>

 </div>

 `

 }).join("")

}

document.getElementById("search").addEventListener("input", e => {

 const q = e.target.value.toLowerCase()

 const filtered = tickets.filter(t =>
  t.Nome.toLowerCase().includes(q) ||
  t.Telefone.includes(q) ||
  t.Ticket.toLowerCase().includes(q)
 )

 renderTickets(filtered)

})

loadTickets()

async function updateStatus(ticket,estado){

 await fetch("/api/updateTicket",{
  method:"POST",
  headers:{
   "Content-Type":"application/json"
  },
  body:JSON.stringify({
   ticket,
   estado
  })
 })

}

function showAbertos(){

 renderTickets(
  tickets.filter(t => t.Estado === "Aberto")
 )

}

function showPendentes(){

 renderTickets(
  tickets.filter(t =>
   t.Estado === "Respondido" ||
   t.Estado === "Pendente"
  )
 )

}

function showResolvidos(){

 renderTickets(
  tickets.filter(t => t.Estado === "Resolvido")
 )

}

function showTodos(){

 renderTickets(tickets)

}


async function saveTicket(ticket){

 const estado =
 document.querySelector(
  `select[onchange*="${ticket}"]`
 ).value

 const obs =
 document.getElementById(`obs-${ticket}`).value

 await fetch("/api/updateTicket",{
  method:"POST",
  headers:{
   "Content-Type":"application/json"
  },
  body:JSON.stringify({
   ticket,
   estado,
   obs
  })
 })

 alert("Ticket atualizado")

}

</script>

</body>
</html>
