<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Assistência Técnica</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="max-w-xl mx-auto p-4">

<h1 class="text-3xl font-bold text-center mb-6">
Assistência Técnica
</h1>

<p class="text-center mb-6">
Electricidade e Manutenção de Piscinas
</p>

<form id="ticketForm" class="bg-white p-4 rounded shadow">

<input class="w-full border p-2 mb-3" placeholder="Nome" name="name" required>

<input class="w-full border p-2 mb-3" placeholder="Telefone" name="phone" required>

<input class="w-full border p-2 mb-3" placeholder="Email" name="email">

<input class="w-full border p-2 mb-3" placeholder="Localidade" name="city" required>

<label class="block mb-1">Fotografias (até 5)</label>

<input
type="file"
id="photos"
name="photos"
accept="image/png,image/jpeg,image/webp"
multiple
class="w-full border p-2 mb-3">

<textarea class="w-full border p-2 mb-3"
placeholder="Descrição do problema"
name="description"
required></textarea>

<button class="bg-blue-600 text-white w-full p-3 rounded">
Enviar Pedido
</button>

</form>

<div id="msg" class="text-center mt-4"></div>

</div>

<script>

const form = document.getElementById("ticketForm")

form.addEventListener("submit", async (e)=>{

 e.preventDefault()

 const formData = new FormData(form)

 const files = document.getElementById("photos").files

 if(files.length > 5){
  alert("Pode enviar no máximo 5 fotografias.")
  return
 }

 for(const file of files){

  if(file.size > 5 * 1024 * 1024){
   alert("Cada imagem deve ter no máximo 5MB.")
   return
  }

 }

 let imageUrls = []

 for(const file of files){

  const data = new FormData()

  data.append("file", file)
  data.append("upload_preset", "tickets")

  const res = await fetch(
   "https://api.cloudinary.com/v1_1/djrlckujy/image/upload",
   {
    method:"POST",
    body:data
   }
  )

  const json = await res.json()

  imageUrls.push(json.secure_url)

 }

 const body = Object.fromEntries(formData)

 body.images = imageUrls

 const res = await fetch("/api/ticket",{
   method:"POST",
   headers:{
     "Content-Type":"application/json"
   },
   body:JSON.stringify(body)
 })

 if(res.ok){
   document.getElementById("msg").innerText="Pedido enviado com sucesso!"
   form.reset()
 }else{
   document.getElementById("msg").innerText="Erro ao enviar pedido."
 }

})

</script>

</body>
</html>
