<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Assistência Técnica</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="max-w-xl mx-auto p-4">

<h1 class="text-3xl font-bold text-center mb-6">
Assistência Técnica
</h1>

<p class="text-center mb-6">
Electricidade e Piscinas
</p>

<form id="ticketForm" class="bg-white p-4 rounded shadow">

<input class="w-full border p-2 mb-3" placeholder="Nome" name="name" required>

<input class="w-full border p-2 mb-3" placeholder="Telefone" name="phone" required>

<input class="w-full border p-2 mb-3" placeholder="Email" name="email">

<input class="w-full border p-2 mb-3" placeholder="Localidade" name="city" required>

<textarea class="w-full border p-2 mb-3"
placeholder="Descrição do problema"
name="description"
required></textarea>

<button class="bg-blue-600 text-white w-full p-3 rounded">
Enviar Pedido
</button>

</form>

<div id="msg" class="text-center mt-4"></div>

</div>

<script>

const form = document.getElementById("ticketForm")

form.addEventListener("submit", async (e)=>{

 e.preventDefault()

 const data = Object.fromEntries(new FormData(form))

 const res = await fetch("API_URL/ticket",{

 method:"POST",

 headers:{
  "Content-Type":"application/json"
 },

 body:JSON.stringify(data)

 })

 document.getElementById("msg").innerText="Pedido enviado!"

})

</script>

</body>

</html>
